<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupraScope — ETH Object</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--accent:#33ccee;--mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif;
--canvas-bg:#06081a;
}
html,body{height:100%;background:var(--canvas-bg);color:#fff;font-family:var(--sans)}
nav{
position:fixed;top:0;left:0;right:0;z-index:200;
display:flex;align-items:center;justify-content:space-between;
padding:16px 48px;
background:rgba(6,8,26,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.08);
}
.nav-logo{font-family:var(--mono);font-size:13px;letter-spacing:.2em;color:#fff;text-decoration:none}
.nav-logo span{color:#33ccee}
.nav-back{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.5);text-decoration:none;text-transform:uppercase;transition:color .2s}
.nav-back:hover{color:#fff}
.live-bar{
position:fixed;bottom:0;left:0;right:0;z-index:200;
background:rgba(6,8,26,.95);border-top:1px solid rgba(255,255,255,.08);
padding:10px 48px;display:flex;align-items:center;justify-content:space-between;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:#33ccee;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-info{display:flex;align-items:center;gap:12px}
.live-asset{font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:rgba(255,255,255,.4);text-transform:uppercase}
.live-regime{font-family:var(--mono);font-size:13px;color:#fff;font-weight:700}
.live-desc{font-size:12px;color:rgba(255,255,255,.4)}
.live-stats{display:flex;gap:20px}
.stat-val{font-family:var(--mono);font-size:13px;color:#fff;font-weight:700;display:block}
.stat-lbl{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase}
canvas{position:fixed;inset:0;width:100%;height:100%;cursor:grab;z-index:1}
canvas:active{cursor:grabbing}
.stream-labels{
position:fixed;top:80px;left:24px;z-index:100;
display:flex;flex-direction:column;gap:4px;pointer-events:none;
}
.stream-label{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;opacity:.6}
.coming-soon{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
z-index:50;text-align:center;pointer-events:none;transition:opacity .8s ease;
}
.cs-title{font-family:var(--mono);font-size:clamp(32px,6vw,64px);color:rgba(255,255,255,.15);font-weight:700;letter-spacing:-.02em;margin-bottom:16px}
.cs-sub{font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.2);letter-spacing:.2em;text-transform:uppercase}

/* ── CONTROL PANEL ── */
.ctrl-toggle{
position:fixed;top:72px;right:16px;z-index:160;
font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;
color:rgba(255,255,255,.6);background:rgba(10,12,30,.8);
border:1px solid rgba(255,255,255,.12);padding:7px 12px;border-radius:6px;cursor:pointer;
backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all .2s;
}
.ctrl-toggle:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.ctrl-panel{
position:fixed;top:108px;right:16px;width:280px;
max-height:calc(100vh - 200px);overflow-y:auto;z-index:155;
display:flex;flex-direction:column;gap:14px;
}
.ctrl-panel.hidden{display:none}
.panel-block{
background:rgba(10,12,30,.82);border:1px solid rgba(255,255,255,.1);
border-radius:10px;overflow:hidden;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.panel-head{
padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.08);
font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:rgba(255,255,255,.45);
text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;
}
.panel-head button{
font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;
color:rgba(255,255,255,.4);background:none;border:1px solid rgba(255,255,255,.15);
padding:3px 8px;cursor:pointer;border-radius:3px;transition:all .2s;
}
.panel-head button:hover{color:#fff;border-color:rgba(255,255,255,.35)}
#dials-container .dial-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
#dials-container .dial-row:last-child{border-bottom:none}
.dial-idx{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.35);width:14px;flex-shrink:0}
.dial-sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dial-track{flex:1;position:relative;height:2px;background:rgba(255,255,255,.12)}
.dial-fill{position:absolute;top:0;height:100%}
.dial-cmark{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:1px;height:6px;background:rgba(255,255,255,.25)}
.dial-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:#fff;pointer-events:none}
input[type=range].dial-input{position:absolute;inset:-10px 0;width:100%;opacity:0;cursor:pointer;height:22px}
.dial-val{font-family:var(--mono);font-size:9px;width:34px;text-align:right;flex-shrink:0;color:rgba(255,255,255,.85)}
.btn-row{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.btn-row button{flex:1;padding:9px 0;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);background:none;border:none;border-right:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .15s}
.btn-row button:last-child{border-right:none}
.btn-row button:hover{background:rgba(255,255,255,.05);color:#fff}
.btn-row button.active{background:#33ccee;color:#04121a}
.bright-section{padding:11px 14px}
.bright-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bright-row:last-child{margin-bottom:0}
.bright-lbl{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.35);width:14px;flex-shrink:0}
.bright-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bright-track{flex:1;position:relative;height:2px;background:rgba(255,255,255,.12)}
.bright-fill{position:absolute;top:0;left:0;height:100%;background:#33ccee}
.bright-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:#fff;pointer-events:none}
input[type=range].bright-input{position:absolute;inset:-10px 0;width:100%;opacity:0;cursor:pointer;height:22px}
.bright-val{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.5);width:32px;text-align:right}
.sim-lbl{padding:9px 14px;font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.4);text-transform:uppercase;border-top:1px solid rgba(255,255,255,.08)}
@media(max-width:720px){
nav{padding:14px 20px}
.live-bar{padding:10px 16px;flex-wrap:wrap;gap:8px}
.ctrl-panel{width:calc(100vw - 32px);max-height:52vh}
}
</style>
</head>
<body>
<nav>
<a href="/" class="nav-logo">Supra<span>Scope</span></a>
<a href="/" class="nav-back">← Back to BTC</a>
</nav>
<canvas id="hero-canvas"></canvas>
<div class="stream-labels">
<span class="stream-label" style="color:#33ccee">Price</span>
<span class="stream-label" style="color:#6699ff">Microstructure</span>
<span class="stream-label" style="color:#ee4499">Derivatives</span>
<span class="stream-label" style="color:#33ff99">On-chain</span>
<span class="stream-label" style="color:#ffcc33">Social</span>
<span class="stream-label" style="color:#80eecc">Macro</span>
</div>
<div class="coming-soon" id="coming-soon">
<div class="cs-title">ETH</div>
<div class="cs-sub">Awaiting first epoch</div>
</div>

<!-- CONTROL PANEL -->
<button class="ctrl-toggle" id="ctrl-toggle" onclick="togglePanel()">Controls</button>
<div class="ctrl-panel" id="ctrl-panel">
<div class="panel-block">
<div class="panel-head">Force field <button onclick="resetDials()">Reset</button></div>
<div id="dials-container"></div>
<div class="btn-row" id="quality-bar">
<button class="q-btn" id="q-eco" onclick="setQuality('eco')">Eco</button>
<button class="q-btn" id="q-mid" onclick="setQuality('mid')">Mid</button>
<button class="q-btn active" id="q-ultra" onclick="setQuality('ultra')">Ultra</button>
</div>
<div class="btn-row">
<button class="skin-btn" id="sk-solid" onclick="setSkin('solid')">Solid</button>
<button class="skin-btn active" id="sk-ghost" onclick="setSkin('ghost')">Ghost</button>
<button class="skin-btn" id="sk-off" onclick="setSkin('off')">Off</button>
</div>
<div class="sim-lbl" id="sim-lbl">Nominal · drag dials to explore</div>
</div>
<div class="panel-block">
<div class="panel-head">Brightness</div>
<div class="bright-section">
<div class="bright-row">
<span class="bright-lbl" style="width:28px;font-size:8px">ALL</span>
<div class="bright-track" id="obt">
<div class="bright-fill" id="obf" style="width:100%"></div>
<div class="bright-thumb" id="obth" style="left:100%"></div>
<input type="range" class="bright-input" id="overall-bright" min="0" max="200" step="1" value="200" aria-label="Overall brightness">
</div>
<span class="bright-val" id="obv">200%</span>
</div>
<div id="layer-bright-container"></div>
</div>
</div>
</div>

<div class="live-bar">
<div class="live-info">
<span class="live-dot"></span>
<span class="live-asset">ETH · Live</span>
<span class="live-regime" id="lb-regime">Connecting</span>
<span class="live-desc" id="lb-desc">Subscribing to ETH engine</span>
</div>
<div class="live-stats">
<div><span class="stat-val">ETH</span><span class="stat-lbl">Asset</span></div>
<div><span class="stat-val" id="lb-epoch">—</span><span class="stat-lbl">Epoch</span></div>
<div><span class="stat-val" id="lb-status">…</span><span class="stat-lbl">Status</span></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── GLOBALS ───────────────────────────────────────────────────────
window._renderers = [];
window._scenes = [];

// ── QUALITY TIERS ─────────────────────────────────────────────────
const QUALITY_TIERS = {
eco:   { mul:0.18, ptSize:0.018, connRate:0.012, skinDetail:1, fogDensity:0.55, label:'Eco' },
mid:   { mul:0.55, ptSize:0.014, connRate:0.042, skinDetail:3, fogDensity:0.42, label:'Mid' },
ultra: { mul:1.00, ptSize:0.011, connRate:0.075, skinDetail:5, fogDensity:0.22, label:'Ultra' },
};
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 600;
let currentQuality = isMobile ? 'eco' : 'ultra';
const quality = { get cfg(){ return QUALITY_TIERS[currentQuality]; } };

// ── STREAM CONFIG ──────────────────────────────────────────────────
const STREAM_BASE = [
{ name:'Price',          r:0.20, g:0.80, b:0.90, baseCount:1000, layerZ: 0.00, armN:3, spread:1.20, tiltX:0, tiltY:0, rotOff:0.0, coreSize:0.12, armTight:0.55 },
{ name:'Microstructure', r:0.40, g:0.60, b:1.00, baseCount:850,  layerZ: 0.20, armN:4, spread:1.00, tiltX:0, tiltY:0, rotOff:0.4, coreSize:0.06, armTight:0.70 },
{ name:'Derivatives',    r:0.90, g:0.30, b:0.60, baseCount:850,  layerZ:-0.20, armN:2, spread:1.30, tiltX:0, tiltY:0, rotOff:0.9, coreSize:0.18, armTight:0.45 },
{ name:'On-chain',       r:0.20, g:1.00, b:0.60, baseCount:700,  layerZ: 0.38, armN:5, spread:0.90, tiltX:0, tiltY:0, rotOff:0.2, coreSize:0.08, armTight:0.80 },
{ name:'Social',         r:1.00, g:0.80, b:0.20, baseCount:700,  layerZ:-0.38, armN:2, spread:1.10, tiltX:0, tiltY:0, rotOff:1.2, coreSize:0.14, armTight:0.50 },
{ name:'Macro',          r:0.50, g:0.90, b:0.80, baseCount:600,  layerZ: 0.52, armN:1, spread:1.40, tiltX:0, tiltY:0, rotOff:0.6, coreSize:0.22, armTight:0.35 },
];
function getStreams(){
return STREAM_BASE.map(s=>({...s, count:Math.max(40,Math.floor(s.baseCount*quality.cfg.mul))}));
}
let STREAMS = getStreams();
const DCOLS=['#33ccee','#6699ff','#ee4499','#33ff99','#ffcc33','#80eecc'];

// ── BRIGHTNESS ─────────────────────────────────────────────────────
const brightnessOverall = {val:2.0};
const brightnessLayer = new Array(6).fill(1.8);
function buildBrightness(){
const ob = document.getElementById('overall-bright');
if(ob) ob.addEventListener('input',e=>{
brightnessOverall.val = parseFloat(e.target.value)/100;
const pct = parseFloat(e.target.value)/2;
const obf=document.getElementById('obf'); if(obf) obf.style.width=pct+'%';
const obth=document.getElementById('obth'); if(obth) obth.style.left=pct+'%';
const obv=document.getElementById('obv'); if(obv) obv.textContent=e.target.value+'%';
});
const c = document.getElementById('layer-bright-container');
if(!c) return;
c.innerHTML='';
STREAMS.forEach((s,i)=>{
const row=document.createElement('div');
row.className='bright-row';
row.innerHTML=`<span class="bright-lbl">${String(i+1).padStart(2,'0')}</span><span class="bright-dot" style="background:${DCOLS[i]}"></span><div class="bright-track" id="lbt${i}"><div class="bright-fill" id="lbf${i}" style="width:50%"></div><div class="bright-thumb" id="lbth${i}" style="left:50%"></div><input type="range" class="bright-input" id="lb${i}" min="0" max="200" step="1" value="100" aria-label="Layer ${i+1} brightness"></div><span class="bright-val" id="lbv${i}">100%</span>`;
c.appendChild(row);
document.getElementById(`lb${i}`).addEventListener('input',e=>{
brightnessLayer[i]=parseFloat(e.target.value)/100;
const pct=parseFloat(e.target.value)/2;
document.getElementById(`lbf${i}`).style.width=pct+'%';
document.getElementById(`lbth${i}`).style.left=pct+'%';
document.getElementById(`lbv${i}`).textContent=e.target.value+'%';
});
});
}
buildBrightness();

// ── REGIME DESCRIPTIONS ────────────────────────────────────────────
const REGIME_DESC = {
nominal: 'Market structure in equilibrium',
expanding_coherent: 'Energy entering — all streams aligned',
expanding_fragmented: 'Expansion with layer divergence',
compressing: 'Participation contracting',
high_tension: 'Opposing forces — structural stress',
turbulent: 'Coherence breakdown — high volatility',
eerie_coherent: 'Unnatural stillness — pre-transition',
memory_active: 'Historical pattern recognized',
novel_territory: 'No strong historical match',
pre_topology: 'Topology event conditions forming',
active: 'Structural activity above baseline',
};

// ── SKIN MODE ──────────────────────────────────────────────────────
let skinMode = 'ghost';
const skinRefs = { mesh:null, wire:null, inner:null };
function setSkin(mode){
skinMode = mode;
['solid','ghost','off'].forEach(m=>{ const b=document.getElementById('sk-'+m); if(b) b.classList.toggle('active',m===mode); });
applySkimMode();
}
function applySkimMode(){
if(!skinRefs.mesh) return;
if(skinMode==='off'){
skinRefs.mesh.visible = false; skinRefs.wire.visible = false;
if(skinRefs.inner) skinRefs.inner.visible = false;
} else if(skinMode==='ghost'){
skinRefs.mesh.visible = true; skinRefs.wire.visible = true;
if(skinRefs.inner) skinRefs.inner.visible = true;
skinRefs.mesh.material.opacity = 0.12; skinRefs.wire.material.opacity = 0.10;
} else {
skinRefs.mesh.visible = true; skinRefs.wire.visible = true;
if(skinRefs.inner) skinRefs.inner.visible = true;
}
}

// ── DIALS ──────────────────────────────────────────────────────────
// dialState is the single source of truth — the object reads from it,
// and each live ETH epoch writes into it. Drag a dial to explore; the
// next epoch (~15s) snaps it back to the real structural value.
const dialState = new Array(6).fill(0);
function dialColor(v){
if(v<-6)return'#1144ee';if(v<-2)return'#6622ee';if(v<0)return'#9944bb';
if(v===0)return'#181830';if(v<3)return'#ee5522';if(v<7)return'#eeaa11';return'#ffdd00';
}
function buildDials(){
const c=document.getElementById('dials-container');if(!c)return;c.innerHTML='';
for(let i=0;i<6;i++){
const r=document.createElement('div');r.className='dial-row';
r.innerHTML=`<span class="dial-idx">0${i+1}</span><span class="dial-sdot" style="background:${DCOLS[i]}"></span><div class="dial-track" id="tr${i}"><div class="dial-fill" id="fi${i}"></div><div class="dial-cmark"></div><div class="dial-thumb" id="th${i}"></div><input type="range" class="dial-input" id="di${i}" min="-10" max="10" step="0.1" value="0"></div><span class="dial-val" id="dv${i}">0.0</span>`;
c.appendChild(r);
document.getElementById(`di${i}`).addEventListener('input',e=>{dialState[i]=parseFloat(e.target.value);refreshDial(i);refreshLbl();});
refreshDial(i);
}
}
function refreshDial(i){
const v=dialState[i],pct=(v+10)/20*100,col=dialColor(v);
const fi=document.getElementById(`fi${i}`),th=document.getElementById(`th${i}`),dv=document.getElementById(`dv${i}`);
if(!fi||!th||!dv) return;
if(v>=0){fi.style.left='50%';fi.style.width=(pct-50)+'%';}else{fi.style.left=pct+'%';fi.style.width=(50-pct)+'%';}
fi.style.background=col;th.style.left=pct+'%';th.style.color=col;
dv.textContent=(v>=0?'+':'')+v.toFixed(1);dv.style.color=col;
}
function resetDials(){for(let i=0;i<6;i++){dialState[i]=0;const el=document.getElementById(`di${i}`);if(el)el.value=0;refreshDial(i);}refreshLbl();}
function refreshLbl(){
const m=Math.sqrt(dialState.reduce((s,v)=>s+v*v,0));
const el=document.getElementById('sim-lbl');if(!el)return;
if(m<1.5)el.textContent='Nominal · drag dials to explore';
else if(m<5)el.textContent='Active deviation';
else if(m<10)el.textContent='Significant departure';
else el.textContent='Extreme state';
}
buildDials();

// ── QUALITY SWITCHER ───────────────────────────────────────────────
const simRefs = { rebuild: null };
function setQuality(tier){
currentQuality = tier;
STREAMS = getStreams();
['eco','mid','ultra'].forEach(t=>{ const btn=document.getElementById('q-'+t); if(btn) btn.classList.toggle('active',t===tier); });
if(simRefs.rebuild) simRefs.rebuild();
}
if(isMobile){
document.getElementById('q-eco')?.classList?.add('active');
document.getElementById('q-ultra')?.classList?.remove('active');
}

// ── PANEL TOGGLE ───────────────────────────────────────────────────
function togglePanel(){ const p=document.getElementById('ctrl-panel'); if(p) p.classList.toggle('hidden'); }

// ── GALAXY BUILDER ─────────────────────────────────────────────────
function gaussRand(){
let u=0,v=0;
while(u===0)u=Math.random();while(v===0)v=Math.random();
return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function buildGalaxy(cfg){
const n=cfg.count;
const pos=new Float32Array(n*3);
const col=new Float32Array(n*3);
const nom=new Float32Array(n*3);
const tiltX = cfg.tiltX || 0;
const tiltY = cfg.tiltY || 0;
const tiltQ=new THREE.Quaternion().setFromEuler(new THREE.Euler(tiltX, tiltY, tiltX*0.3));
for(let i=0;i<n;i++){
let x,y,z;
const coreSize = cfg.coreSize || 0.10;
const armTight = cfg.armTight || 0.55;
const rotOff = cfg.rotOff || 0;
if(Math.random()<0.12){
const cr=Math.abs(gaussRand())*coreSize;
const ca=Math.random()*Math.PI*2;
x=Math.cos(ca)*cr;y=(Math.random()-.5)*.006;z=Math.sin(ca)*cr;
} else {
const arm=Math.floor(Math.random()*cfg.armN);
const t=Math.pow(Math.random(), armTight);
const angle=(arm/cfg.armN)*Math.PI*2 + t*Math.PI*2.4 + rotOff + (Math.random()-.5)*.32;
const radius=0.06+t*cfg.spread*.65;
const scatter=(1-t*.55)*(0.03+cfg.spread*.02);
x=Math.cos(angle)*radius+(Math.random()-.5)*scatter;
y=(Math.random()-.5)*.008*(1-t*.8);
z=Math.sin(angle)*radius+(Math.random()-.5)*scatter;
}
const v=new THREE.Vector3(x,y,z).applyQuaternion(tiltQ);
const dist=Math.sqrt(v.x*v.x+v.z*v.z);
v.z += (cfg.layerZ || 0);
pos[i*3]=v.x;pos[i*3+1]=v.y;pos[i*3+2]=v.z;
nom[i*3]=v.x;nom[i*3+1]=v.y;nom[i*3+2]=v.z;
const cs = cfg.coreSize || 0.12;
const coreBoost = dist < cs ? 2.2 : dist < cs*2 ? 1.4 : 1.0;
const bright=Math.max(0.22,1-dist/cfg.spread*.48)*(0.5+Math.random()*.5)*coreBoost;
col[i*3]=cfg.r*bright;col[i*3+1]=cfg.g*bright;col[i*3+2]=cfg.b*bright;
}
return{pos,col,nom,n};
}

// ── SKIN BUILDER ───────────────────────────────────────────────────
function buildSkin(galaxies){
const allPts=[];
galaxies.forEach(g=>{
const step=Math.max(1,Math.floor(g.n/120));
for(let i=0;i<g.n;i+=step){
allPts.push(new THREE.Vector3(g.pos[i*3],g.pos[i*3+1],g.pos[i*3+2]));
}
});
const centroid=new THREE.Vector3();
allPts.forEach(p=>centroid.add(p));
centroid.divideScalar(allPts.length);
const geo=new THREE.IcosahedronGeometry(1,3);
const posAttr=geo.attributes.position;
const count=posAttr.count;
for(let i=0;i<count;i++){
const dir=new THREE.Vector3(posAttr.getX(i),posAttr.getY(i),posAttr.getZ(i)).normalize();
let maxProj = 0.5;
allPts.forEach(p=>{
const rel=p.clone().sub(centroid);
const proj=rel.dot(dir);
if(proj>maxProj) maxProj=proj;
});
const r=maxProj*1.12;
posAttr.setXYZ(i, centroid.x+dir.x*r, centroid.y+dir.y*r, centroid.z+dir.z*r);
}
geo.computeVertexNormals();
const mat=new THREE.MeshPhongMaterial({
color: new THREE.Color(0.20,0.55,0.90),
emissive: new THREE.Color(0.05,0.18,0.30),
specular: new THREE.Color(0.7,0.9,1.0),
shininess:120, transparent:true, opacity:0.06,
side:THREE.DoubleSide, depthWrite:false, wireframe:false
});
const innerMat=new THREE.MeshPhongMaterial({
color: new THREE.Color(0.30,0.70,1.00),
emissive: new THREE.Color(0.08,0.25,0.40),
transparent:true, opacity:0.04, side:THREE.BackSide, depthWrite:false,
});
const wireMat=new THREE.MeshBasicMaterial({
color:new THREE.Color(0.35,0.75,1.0),
transparent:true, opacity:0.10, wireframe:true, depthWrite:false
});
return{geo,mat,wireMat,innerMat,posAttr,centroid,count};
}

// ── CONNECTORS ────────────────────────────────────────────────────
function buildConnectors(posA,posB,nA,nB,cA,cB,maxDist,rate){
const lp=[],lc=[];
const sA=Math.floor(nA*rate);
for(let i=0;i<sA;i++){
const ai=Math.floor(Math.random()*nA);
const ax=posA[ai*3],ay=posA[ai*3+1],az=posA[ai*3+2];
let best=Infinity,bi=-1;
const sN=Math.floor(nB*.12);
for(let s=0;s<sN;s++){
const bj=Math.floor(Math.random()*nB);
const dx=posB[bj*3]-ax,dy=posB[bj*3+1]-ay,dz=posB[bj*3+2]-az;
const d=dx*dx+dy*dy+dz*dz;
if(d<best){best=d;bi=bj;}
}
if(bi>=0&&Math.sqrt(best)<maxDist){
lp.push(ax,ay,az,posB[bi*3],posB[bi*3+1],posB[bi*3+2]);
lc.push(cA[0],cA[1],cA[2],cB[0],cB[1],cB[2]);
}
}
return{pos:new Float32Array(lp),col:new Float32Array(lc)};
}

// ── RENDERER FACTORY ───────────────────────────────────────────────

function makeDrag(el,initRX,initRY,initZ){
let drag=false,px=0,py=0,rX=initRX,rY=initRY,z=initZ||2.6;
let pinchDist0=null;
el.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
if(!drag)return;
rY+=(e.clientX-px)*.004;rX+=(e.clientY-py)*.004;
rX=Math.max(-1.4,Math.min(1.4,rX));px=e.clientX;py=e.clientY;
});
el.addEventListener('wheel',e=>{
e.preventDefault();
z+=e.deltaY*.004;
z=Math.max(.4,Math.min(8.0,z));
},{passive:false});
el.addEventListener('touchstart',e=>{
if(e.touches.length===2){
pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
} else {
drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;
}
},{passive:true});
window.addEventListener('touchend',()=>{drag=false;pinchDist0=null;});
window.addEventListener('touchmove',e=>{
if(e.touches.length===2&&pinchDist0!==null){
const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
z-=(dist-pinchDist0)*.008;
z=Math.max(.4,Math.min(8.0,z));
pinchDist0=dist;
} else if(drag){
rY+=(e.touches[0].clientX-px)*.005;rX+=(e.touches[0].clientY-py)*.005;
px=e.touches[0].clientX;py=e.touches[0].clientY;
}
},{passive:true});
return{get rX(){return rX},get rY(){return rY},get z(){return z},get drag(){return drag},setRY(v){rY=v}};
}

// ── SPRITE TEXTURE ────────────────────────────────────────────────
function makeSprite(){
const c=document.createElement('canvas');
c.width=c.height=64;
const ctx=c.getContext('2d');
const g=ctx.createRadialGradient(32,32,0,32,32,32);
g.addColorStop(0,'rgba(255,255,255,1)');
g.addColorStop(0.4,'rgba(255,255,255,0.8)');
g.addColorStop(0.8,'rgba(255,255,255,0.2)');
g.addColorStop(1,'rgba(255,255,255,0)');
ctx.fillStyle=g;ctx.fillRect(0,0,64,64);
return new THREE.CanvasTexture(c);
}
let SPRITE_TEX = null;

// ── SCENE BUILDER ──────────────────────────────────────────────────
function buildScene(scene){
const galaxies=STREAMS.map(cfg=>buildGalaxy(cfg));
galaxies.forEach((g)=>{
const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(g.pos.slice(),3));
geo.setAttribute('color',new THREE.BufferAttribute(g.col,3));
const mat=new THREE.PointsMaterial({
size:.014, vertexColors:true, transparent:true, opacity:.9,
sizeAttenuation:true, depthWrite:false,
map:SPRITE_TEX||makeSprite(), alphaMap:SPRITE_TEX||makeSprite(),
alphaTest:0.01, blending:THREE.AdditiveBlending,
});
const pts=new THREE.Points(geo,mat);
scene.add(pts);
g.pts=pts;g.geo=geo;g.mat=mat;
});
const cr=quality.cfg.connRate;
const connPairs=[[0,1,.52,cr],[1,2,.52,cr],[2,3,.52,cr*.9],[3,4,.52,cr*.9],[4,5,.52,cr*.75],[0,3,.58,cr*.65],[1,4,.58,cr*.60],[2,5,.58,cr*.50]];
const connObjs=[];
connPairs.forEach(([ai,bi,md,rate])=>{
const gA=galaxies[ai],gB=galaxies[bi];
const cA=[STREAMS[ai].r,STREAMS[ai].g,STREAMS[ai].b];
const cB=[STREAMS[bi].r,STREAMS[bi].g,STREAMS[bi].b];
const{pos,col}=buildConnectors(gA.pos,gB.pos,gA.n,gB.n,cA,cB,md,rate);
const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos.slice(),3));
geo.setAttribute('color',new THREE.BufferAttribute(col,3));
const mat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.35,depthWrite:false});
const lines=new THREE.LineSegments(geo,mat);
scene.add(lines);
connObjs.push({geo,mat,nomPos:pos.slice(),ai,bi});
});
const skin=buildSkin(galaxies);
const skinMesh=new THREE.Mesh(skin.geo,skin.mat);
scene.add(skinMesh);
const innerMesh=new THREE.Mesh(skin.geo.clone(),skin.innerMat);
innerMesh.scale.setScalar(0.92);
scene.add(innerMesh);
const wireframeMesh=new THREE.Mesh(skin.geo.clone(),skin.wireMat);
scene.add(wireframeMesh);
return{galaxies,connObjs,skinData:skin,skinMesh,wireframeMesh,innerMesh};
}

// ── LIVE OBJECT (driven by dialState) ──────────────────────────────
if(!SPRITE_TEX) SPRITE_TEX = makeSprite();
(function(){
const{renderer,scene,camera}=makeRenderer('hero-canvas');
window._renderers.push(renderer);
window._scenes.push(scene);
camera.position.set(0,.8,2.8);

let galaxies,connObjs,skinData,skinMesh,wireframeMesh,skinNominal;
function initScene(){
while(scene.children.length>0){
const o=scene.children[0];
scene.remove(o);
if(o.geometry) o.geometry.dispose();
if(o.material){ if(Array.isArray(o.material)) o.material.forEach(m=>m.dispose()); else o.material.dispose(); }
}
const amb=new THREE.AmbientLight(0x112233,3); scene.add(amb);
const l1=new THREE.PointLight(0x33ccee,6,8);l1.position.set(1.5,1,1.5);scene.add(l1);
const l2=new THREE.PointLight(0x6699ff,4,8);l2.position.set(-1.5,-.5,1);scene.add(l2);
const l3=new THREE.PointLight(0x80eecc,3,8);l3.position.set(0,2,-1);scene.add(l3);
const built=buildScene(scene);
galaxies=built.galaxies;connObjs=built.connObjs;
skinData=built.skinData;skinMesh=built.skinMesh;wireframeMesh=built.wireframeMesh;
skinNominal=new Float32Array(skinData.posAttr.array.length);
skinNominal.set(skinData.posAttr.array);
skinRefs.mesh=skinMesh;skinRefs.wire=wireframeMesh;skinRefs.inner=built.innerMesh||null;
applySkimMode();
scene.fog=new THREE.FogExp2(0x02020a,quality.cfg.fogDensity*0.5);
}
initScene();
simRefs.rebuild = initScene;

const d=makeDrag(document.getElementById('hero-canvas'),.12,0,3.0);
let t=0;
(function tick(){
requestAnimationFrame(tick);t+=.00055;
if(!galaxies){renderer.render(scene,camera);return;}

const inertia=dialState[0],tension=dialState[1],compression=dialState[2],
expansion=dialState[3],turbulence=dialState[4],memory=dialState[5];
const inertDamp=Math.max(.02,1-Math.abs(inertia)*.055);

// ── Particles ──
galaxies.forEach((g,si)=>{
if(!g.geo)return;
const arr=g.geo.attributes.position.array;
const nom=g.pos;const n=g.n;const ss=.85+si*.06;
const memF=(.015+Math.max(0,memory)*.009)*inertDamp;
const compF=compression*.00055*ss*inertDamp;
const expF=expansion*.00055*ss*inertDamp;
const tenF=tension*.00065*ss*inertDamp;
const tw=Math.sin(t*1.1+si*.95)*turbulence*.00045*inertDamp;
for(let i=0;i<n;i++){
const ix=i*3,iy=ix+1,iz=ix+2;
let x=arr[ix],y=arr[iy],z=arr[iz];
x+=(nom[ix]-x)*memF;y+=(nom[iy]-y)*memF;z+=(nom[iz]-z)*memF;
x-=x*compF;y-=y*compF;z-=z*compF;
const len=Math.sqrt(x*x+y*y+z*z)+.001;
x+=(x/len)*expF;y+=(y/len)*expF;z+=(z/len)*expF;
y+=y*tenF;x-=x*tenF*.25;z-=z*tenF*.25;
x+=tw;
x+=Math.sin(t*0.8+nom[ix]*4+t)*0.0006;
z+=Math.sin(t*0.7+nom[iz]*4+t*0.9)*0.0006;
arr[ix]=x;arr[iy]=y;arr[iz]=z;
}
g.geo.attributes.position.needsUpdate=true;
const bMul=brightnessOverall.val*brightnessLayer[si];
g.mat.size=(quality.cfg.ptSize+expansion*.0006-compression*.0004)*Math.max(.3,bMul);
g.mat.opacity=Math.min(1,(.9+Math.abs(turbulence)*.008)*bMul);
});

// ── Connectors ──
connObjs.forEach(co=>{
const arr=co.geo.attributes.position.array;
const nom=co.nomPos;const nL=arr.length/6;
const turbMag=Math.abs(turbulence)/10,tensMag=Math.abs(tension)/10;
co.mat.opacity=Math.min(.95,(.24+turbMag*.32+tensMag*.18)*brightnessOverall.val);
const memF=(.01+Math.max(0,memory)*.007)*inertDamp;
const compF=compression*.00045*inertDamp;
const expF=expansion*.00045*inertDamp;
const tenF=tension*.00055*inertDamp;
const tw=Math.sin(t*1.1+co.ai*.95)*turbulence*.00045*inertDamp + Math.sin(t*0.6+co.ai)*0.0005;
for(let i=0;i<nL;i++){
for(let e=0;e<2;e++){
const b=i*6+e*3;
let x=arr[b],y=arr[b+1],z=arr[b+2];
const nx=nom[b],ny=nom[b+1],nz=nom[b+2];
x+=(nx-x)*memF;y+=(ny-y)*memF;z+=(nz-z)*memF;
x-=x*compF;y-=y*compF;z-=z*compF;
const len=Math.sqrt(x*x+y*y+z*z)+.001;
x+=(x/len)*expF;y+=(y/len)*expF;z+=(z/len)*expF;
y+=y*tenF;x-=x*tenF*.25;z-=z*tenF*.25;
x+=tw;
arr[b]=x;arr[b+1]=y;arr[b+2]=z;
}
}
co.geo.attributes.position.needsUpdate=true;
});

// ── Skin ──
const skinArr=skinData.posAttr.array;
const smemF=(.008+Math.max(0,memory)*.006)*inertDamp;
const scompF=compression*.0005*inertDamp;
const sexpF=expansion*.0006*inertDamp;
const stenF=tension*.0007*inertDamp;
const sturbF=turbulence*.0003*inertDamp;
for(let i=0;i<skinData.count;i++){
const ix=i*3,iy=ix+1,iz=ix+2;
let x=skinArr[ix],y=skinArr[iy],z=skinArr[iz];
const nx=skinNominal[ix],ny=skinNominal[iy],nz=skinNominal[iz];
x+=(nx-x)*smemF;y+=(ny-y)*smemF;z+=(nz-z)*smemF;
x-=x*scompF;y-=y*scompF;z-=z*scompF;
const len=Math.sqrt(x*x+y*y+z*z)+.001;
x+=(x/len)*sexpF;y+=(y/len)*sexpF;z+=(z/len)*sexpF;
y+=y*stenF;x-=x*stenF*.22;z-=z*stenF*.22;
const wave=Math.sin(t*1.5+nx*3+nz*2)*sturbF;
x+=wave;z+=wave*.7;
skinArr[ix]=x;skinArr[iy]=y;skinArr[iz]=z;
}
skinData.posAttr.needsUpdate=true;
skinData.geo.computeVertexNormals();

const mag=Math.sqrt(dialState.reduce((s,v)=>s+v*v,0));
if(skinMode==='solid'){
const baseOpacity=.12+expansion*.012-compression*.007;
skinMesh.material.opacity=Math.max(.03,Math.min(.45,(baseOpacity+mag*.009)*brightnessOverall.val));
} else if(skinMode==='ghost'){
skinMesh.material.opacity=0.05;
if(skinRefs.inner) skinRefs.inner.material.opacity=0.03;
}
const warmth=(tension+expansion)/20;
const cold=(-tension+compression)/20;
const skinR = .20+Math.max(0,warmth)*.55;
const skinG = .50+Math.abs(turbulence/10)*.25;
const skinB = .95-Math.max(0,warmth)*.30+Math.max(0,cold)*.10;
skinMesh.material.color.setRGB(skinR,skinG,skinB);
skinMesh.material.emissive.setRGB(skinR*.18,skinG*.14,skinB*.28);
if(skinRefs.inner){
skinRefs.inner.material.color.setRGB(skinR*.8,skinG*.8,skinB);
skinRefs.inner.material.emissive.setRGB(skinR*.25,skinG*.18,skinB*.35);
}
if(skinMode==='solid'){
wireframeMesh.material.opacity=Math.min(.6,(.08+Math.abs(turbulence)*.018)*brightnessOverall.val);
} else if(skinMode==='ghost'){
wireframeMesh.material.opacity=0.06;
}
const wArr=wireframeMesh.geometry.attributes.position.array;
wArr.set(skinArr);
wireframeMesh.geometry.attributes.position.needsUpdate=true;
if(skinRefs.inner && skinRefs.inner.geometry.attributes.position){
skinRefs.inner.geometry.attributes.position.array.set(skinArr);
skinRefs.inner.geometry.attributes.position.needsUpdate=true;
skinRefs.inner.geometry.computeVertexNormals();
}

if(!d.drag)d.setRY(d.rY+.0007);
scene.rotation.x=d.rX;scene.rotation.y=d.rY+t;
camera.position.z+=(d.z-camera.position.z)*.08;
renderer.render(scene,camera);
})();
})();

if(isMobile){ document.getElementById('ctrl-panel')?.classList.add('hidden'); }
</script>

<script>
// ── SUPABASE REALTIME (ETH) ────────────────────────────────────────
const SUPA_URL = 'https://vthnydupyvlnckvxicpk.supabase.co';
const SUPA_KEY = 'sb_publishable_Na4PlwjpkYnopMlVoJAjpw_qVqtmst9';

let liveStarted = false;
let lastRegime = null;
let lastEpoch = -Infinity;

function clamp10(v){ return Math.max(-10, Math.min(10, parseFloat(v) || 0)); }

function updateLiveState(s){
// Ignore stale or duplicate epochs — keeps the cold-start seed and the
// realtime stream from fighting each other regardless of arrival order.
const ep = parseFloat(s.epoch);
if(!isNaN(ep)){ if(ep <= lastEpoch) return; lastEpoch = ep; }
// Write the incoming epoch into the shared dialState — drives the
// object AND the dial readouts in one shot.
dialState[0] = clamp10(s.inertia);
dialState[1] = clamp10(s.tension);
dialState[2] = clamp10(s.compression);
dialState[3] = clamp10(s.expansion);
dialState[4] = clamp10(s.turbulence);
dialState[5] = clamp10(s.memory);
for(let i=0;i<6;i++){
const el = document.getElementById('di'+i);

refreshDial(i);
}

notif.textContent = `Regime → ${regime.replace(/_/g,' ')}`;
document.body.appendChild(notif);

}
lastRegime = regime;
}

// Seed immediately with the most recent ETH epoch so the object is
// populated on load instead of waiting up to one epoch (~15s) for the
// next INSERT. Uses a plain fetch with an object header bag rather than
// the supabase-js query builder: some fetch-hooking browser extensions
// choke trying to structured-clone a Headers instance, which is what
// the builder constructs internally.
async function seedLatest(){
try{
const url = `${SUPA_URL}/rest/v1/states?select=*&asset=eq.ETH&order=epoch.desc&limit=1`;
const res = await fetch(url, { headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY } });
if(!res.ok){ console.debug('SupraScope seed skipped:', res.status); return; }
const data = await res.json();
if(Array.isArray(data) && data.length) updateLiveState(data[0]);
}catch(e){ console.debug('SupraScope seed skipped (realtime will populate):', e && e.message); }
}

supa
.channel('live-eth')
.on('postgres_changes', {
event: 'INSERT',
schema: 'public',
table: 'states',
filter: 'asset=eq.ETH'
}, (payload) => {

})
.subscribe((status) => {
if(status === 'SUBSCRIBED'){
console.log('SupraScope live · ETH · connected');
const stEl = document.getElementById('lb-status');
if(stEl && !liveStarted) stEl.textContent = 'Waiting';
}
});

seedLatest();
